<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC Logistics Inventory Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        canvas {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #34495e;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dcdde1;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        .inventory-list {
            margin-top: 30px;
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            background-color: #f8fafc;
            margin-bottom: 10px;
            border: 1px solid #eef1f5;
        }

        .empty-message {
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ABC Logistics Inventory Management</h1>

    <!-- Chart -->
    <canvas id="inventoryChart"></canvas>

    <!-- Form -->
    <div class="form-group">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" placeholder="Enter item name">
    </div>

    <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" placeholder="Enter quantity">
    </div>

    <button onclick="addItem()">Add</button>

    <!-- List -->
    <div class="inventory-list" id="inventoryList"></div>
</div>

<script>
    const inventoryKey = "abc_inventory_data";
    let inventoryChart;

    function getInventory() {
        const data = localStorage.getItem(inventoryKey);
        return data ? JSON.parse(data) : [];
    }

    function saveInventory(items) {
        localStorage.setItem(inventoryKey, JSON.stringify(items));
    }

    function renderInventory() {
        const inventoryList = document.getElementById("inventoryList");
        inventoryList.innerHTML = "";
        const items = getInventory();

        if (items.length === 0) {
            inventoryList.innerHTML = '<div class="empty-message">No inventory items added yet.</div>';
            return;
        }

        items.forEach(item => {
            const itemDiv = document.createElement("div");
            itemDiv.className = "inventory-item";
            itemDiv.innerHTML = `
                <span><strong>${item.name}</strong></span>
                <span>Qty: ${item.quantity}</span>
            `;
            inventoryList.appendChild(itemDiv);
        });
    }

    function updateChart() {
        const items = getInventory();
        const labels = items.map(item => item.name);
        const quantities = items.map(item => item.quantity);

        if (inventoryChart) {
            inventoryChart.data.labels = labels;
            inventoryChart.data.datasets[0].data = quantities;
            inventoryChart.update();
        } else {
            const ctx = document.getElementById("inventoryChart").getContext("2d");
            inventoryChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Inventory Quantity",
                        data: quantities,
                        backgroundColor: "rgba(52, 152, 219, 0.6)",
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { precision: 0 }
                        }
                    }
                }
            });
        }
    }

    function addItem() {
        const nameInput = document.getElementById("itemName");
        const quantityInput = document.getElementById("quantity");

        const name = nameInput.value.trim();
        const quantity = parseInt(quantityInput.value);

        if (!name || isNaN(quantity) || quantity < 0) {
            alert("Please enter valid item name and quantity.");
            return;
        }

        const items = getInventory();
        items.push({ name, quantity });

        saveInventory(items);
        renderInventory();
        updateChart();

        nameInput.value = "";
        quantityInput.value = "";
    }

    window.onload = function () {
        renderInventory();
        updateChart();
    };
</script>

</body>
</html>
